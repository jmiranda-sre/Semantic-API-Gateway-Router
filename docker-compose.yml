version: "3.9"

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - APP_ENV=production
      - APP_PORT=3000
      - APP_VERSION=1.0.0
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ISSUER=semantic-gateway
      - JWT_AUDIENCE=semantic-gateway
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - EMBEDDING_MODEL=text-embedding-3-small
      - EMBEDDING_DIMENSIONS=1536
      - CONFIDENCE_THRESHOLD=0.85
      - CONFLICT_MARGIN=0.05
      - LOG_LEVEL=info
      - METRICS_ENABLED=true
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  gateway-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=development
      - APP_ENV=development
      - APP_PORT=3000
      - JWT_SECRET=dev-secret-change-me-in-production-min-32
      - ADMIN_API_KEY=dev-admin-key-change-me-min-32-chars
      - EMBEDDING_PROVIDER=local
      - LOG_LEVEL=debug
      - METRICS_ENABLED=true
      - CORS_ORIGIN=http://localhost:3000,http://localhost:5173
    volumes:
      - ./src:/app/src
      - ./tsconfig.json:/app/tsconfig.json
    command: ["npx", "tsx", "watch", "src/server/gateway.ts"]
    profiles:
      - dev
